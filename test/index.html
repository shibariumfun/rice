<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AME - A Meme Coin</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--card:#111827;--border:#1e293b;--accent:#6366f1;
  --green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;
  --hover:#1e1b4b;--glow:rgba(99,102,241,.15);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--card)}
header .logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .logo span{font-size:12px;font-weight:400;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-left:8px}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#dc2626}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);background:var(--glow)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.wallet-btn{display:flex;align-items:center;gap:8px}
.wallet-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.header-right{display:flex;align-items:center;gap:12px}
.bal-group{display:flex;gap:10px;align-items:center}
.bal-chip{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
.bal-chip .bl{color:var(--muted);font-size:11px;margin-right:2px}
.bal-chip .bv{font-weight:700;color:var(--text)}
.account-overview{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(167,139,250,.06));border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:16px;margin-bottom:14px}
.account-overview .ao-title{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:500}
.ao-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ao-item{display:flex;flex-direction:column;gap:2px}
.ao-item .ao-label{font-size:11px;color:var(--muted)}
.ao-item .ao-val{font-size:16px;font-weight:700}
.max-btn{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;margin-left:6px;transition:background .2s}
.max-btn:hover{background:#4f46e5}
.balance-hint{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
main{max-width:1200px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h3{font-size:16px;margin-bottom:16px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:8px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.stat-item{text-align:center;padding:16px;background:rgba(99,102,241,.06);border-radius:10px;border:1px solid rgba(99,102,241,.1)}
.stat-item .label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-item .value{font-size:22px;font-weight:700}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.input-group input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none;transition:border .2s}
.input-group input:focus{border-color:var(--accent)}
.input-group .hint{font-size:11px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);padding:4px;border-radius:8px}
.tab{flex:1;padding:10px;text-align:center;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s;border:none;color:var(--muted);background:transparent}
.tab.active-long{background:rgba(34,197,94,.15);color:var(--green)}
.tab.active-short{background:rgba(239,68,68,.15);color:var(--red)}
.position-card{background:var(--bg);border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.position-card .row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.position-card .row .k{color:var(--muted)}
.pnl-pos{color:var(--green)}.pnl-neg{color:var(--red)}
.chart-wrap{position:relative;height:300px;margin-bottom:10px}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:10px;font-size:14px;z-index:999;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:all .3s}
.toast.hidden{opacity:0;transform:translateY(20px);pointer-events:none}
.toast.success{background:#065f46;border:1px solid var(--green);color:var(--green)}
.toast.error{background:#7f1d1d;border:1px solid var(--red);color:#fca5a5}
.toast.info{background:#1e1b4b;border:1px solid var(--accent);color:#c7d2fe}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:14px}
.full-width{grid-column:1/-1}
.action-row{display:flex;gap:10px;margin-top:4px}
.action-row .btn{flex:1}
.est{font-size:13px;color:var(--muted);margin-bottom:10px;min-height:20px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-long{background:rgba(34,197,94,.15);color:var(--green)}
.badge-short{background:rgba(239,68,68,.15);color:var(--red)}
#price-history-section{margin-top:20px}
.refresh-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;transition:transform .3s}
.refresh-btn:hover{color:var(--text)}
.refresh-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
  <div id="toast" class="toast hidden"></div>
</div>
<script>
const MEME_ADDR="0x784Af7c7Db39b1b4673516e2A11F38C276dA8db6";
const TOKEN_ADDR="0x007Eec75f3b65C24B4F27351cAB09EF716255a8b";
const CHAIN_ID=157;
const RPC="https://puppynet.shibrpc.com";
const EXPLORER="https://puppyscan.shib.io";

const MEME_ABI=[{"inputs":[],"name":"BPS","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"K","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"virtualX","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"virtualY","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"ameToken","outputs":[{"type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"closeFeeRate","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"ameAmount","type":"uint256"},{"name":"minPayout","type":"uint256"}],"name":"closeLong","outputs":[{"type":"uint256"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"pointsAmount","type":"uint256"},{"name":"minPayout","type":"uint256"}],"name":"closeShort","outputs":[{"type":"uint256"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"ameAmount","type":"uint256"}],"name":"estimateLongPayout","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"addr","type":"address"},{"name":"pointsAmount","type":"uint256"}],"name":"estimateShortPayout","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"feeCollected","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getMarkPrice","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"addr","type":"address"}],"name":"getShortPnL","outputs":[{"type":"int256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"addr","type":"address"}],"name":"getShortPosition","outputs":[{"components":[{"name":"margin","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"openNotional","type":"uint256"},{"name":"openBlock","type":"uint256"},{"name":"points","type":"uint256"}],"type":"tuple"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getTWAP","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"minTradeAmount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"openFeeRate","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"minAmeOut","type":"uint256"}],"name":"openLong","outputs":[{"type":"uint256"}],"stateMutability":"payable","type":"function"},{"inputs":[{"name":"minPoints","type":"uint256"}],"name":"openShort","outputs":[{"type":"uint256"}],"stateMutability":"payable","type":"function"},{"inputs":[],"name":"totalShortBase","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"type":"uint256"}],"name":"snapshots","outputs":[{"name":"price","type":"uint256"},{"name":"timestamp","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"vault","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tokenMultiplier","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"anonymous":false,"inputs":[{"indexed":true,"name":"user","type":"address"},{"name":"ethAmount","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"ameAmount","type":"uint256"},{"name":"fee","type":"uint256"},{"name":"price","type":"uint256"}],"name":"LongOpened","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"user","type":"address"},{"name":"ameBurned","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"payout","type":"uint256"},{"name":"fee","type":"uint256"},{"name":"price","type":"uint256"}],"name":"LongClosed","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"owner","type":"address"},{"name":"margin","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"openNotional","type":"uint256"},{"name":"points","type":"uint256"},{"name":"price","type":"uint256"}],"name":"ShortOpened","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"owner","type":"address"},{"name":"pointsClosed","type":"uint256"},{"name":"pnl","type":"int256"},{"name":"payout","type":"uint256"},{"name":"fee","type":"uint256"},{"name":"price","type":"uint256"}],"name":"ShortClosed","type":"event"},{"anonymous":false,"inputs":[{"name":"blockNumber","type":"uint256"},{"name":"price","type":"uint256"}],"name":"PriceSnapshot","type":"event"}];

const TOKEN_ABI=[{"inputs":[{"name":"","type":"address"}],"name":"balanceOf","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","outputs":[{"type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"","type":"address"},{"name":"","type":"address"}],"name":"allowance","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"type":"uint8"}],"stateMutability":"view","type":"function"}];

/* ---- state ---- */
let provider,signer,meme,memeRead,token,tokenRead,account=null;
let currentTab="long";
let priceChart=null;
let priceHistory=[];
let refreshTimer=null;
let userBoneBal=0n,userAmeBal=0n;

const readProvider=new ethers.JsonRpcProvider(RPC);
const memeReadOnly=new ethers.Contract(MEME_ADDR,MEME_ABI,readProvider);

/* ---- utils ---- */
const fmt=(v,d=4)=>parseFloat(ethers.formatEther(v)).toFixed(d);
const fmtShort=(v)=>parseFloat(ethers.formatEther(v)).toFixed(6);
const pe=ethers.parseEther;
const fe=ethers.formatEther;
const $=s=>document.querySelector(s);
const shortAddr=a=>a.slice(0,6)+"..."+a.slice(-4);

function showToast(msg,type="info",ms=4000){
  const t=$("#toast");t.textContent=msg;t.className=`toast ${type}`;
  setTimeout(()=>t.classList.add("hidden"),ms);
}

/* ---- render header ---- */
function renderHeader(){
  let balHtml="";
  if(account){
    balHtml=`<div class="bal-group">
      <div class="bal-chip"><span class="bl">BONE</span><span class="bv" id="h-bone">${fmt(userBoneBal,4)}</span></div>
      <div class="bal-chip"><span class="bl">AME</span><span class="bv" id="h-ame">${fmtShort(userAmeBal)}</span></div>
    </div>`;
  }
  $("#header").innerHTML=`
    <div class="logo">AME<span>A Meme Coin · Puppynet</span></div>
    <div class="header-right">
      ${balHtml}
      ${account
        ?`<button class="btn btn-outline wallet-btn" onclick="disconnect()"><span class="dot"></span>${shortAddr(account)}</button>`
        :`<button class="btn btn-primary" onclick="connect()">连接钱包</button>`}
    </div>`;
}

/* ---- render main ---- */
function renderMain(){
  $("#main").innerHTML=`
    <div class="stats" id="stats">
      <div class="stat-item"><div class="label">标记价格</div><div class="value" id="s-price">--</div></div>
      <div class="stat-item"><div class="label">TWAP</div><div class="value" id="s-twap">--</div></div>
      <div class="stat-item"><div class="label">资金池</div><div class="value" id="s-vault">--</div></div>
    </div>
    <div class="grid">
      <div class="card">
        <h3>交易 <button class="refresh-btn" id="refreshBtn" onclick="refreshData()" title="刷新">&#x21bb;</button></h3>
        <div class="tabs">
          <button class="tab ${currentTab==='long'?'active-long':''}" onclick="switchTab('long')">做多 Long</button>
          <button class="tab ${currentTab==='short'?'active-short':''}" onclick="switchTab('short')">做空 Short</button>
        </div>
        <div id="trade-panel"></div>
      </div>
      <div class="card">
        <h3>我的持仓</h3>
        <div id="positions"><div class="empty">连接钱包查看持仓</div></div>
      </div>
      <div class="card full-width" id="price-history-section">
        <h3>价格走势</h3>
        <div class="chart-wrap"><canvas id="priceCanvas"></canvas></div>
      </div>
    </div>`;
  renderTradePanel();
  initChart();
}

function renderTradePanel(){
  const panel=$("#trade-panel");
  if(!panel)return;
  const boneStr=account?fmt(userBoneBal,4):"--";
  if(currentTab==="long"){
    panel.innerHTML=`
      <div class="input-group">
        <label>投入金额 (BONE)</label>
        <input type="number" id="longAmount" placeholder="0.0" step="0.01" min="0" oninput="estimateLong()">
        <div class="balance-hint">
          <span>最小交易: 0.0001 BONE · 手续费 0.5%</span>
          <span>可用: ${boneStr} BONE <button class="max-btn" onclick="fillMaxBone('longAmount')">MAX</button></span>
        </div>
      </div>
      <div class="est" id="longEst"></div>
      <button class="btn btn-green" style="width:100%" onclick="doOpenLong()" id="longBtn">开多</button>`;
  }else{
    panel.innerHTML=`
      <div class="input-group">
        <label>保证金 (BONE)</label>
        <input type="number" id="shortAmount" placeholder="0.0" step="0.01" min="0">
        <div class="balance-hint">
          <span>最小交易: 0.0001 BONE · 手续费 0.5%</span>
          <span>可用: ${boneStr} BONE <button class="max-btn" onclick="fillMaxBone('shortAmount')">MAX</button></span>
        </div>
      </div>
      <div class="est" id="shortEst"></div>
      <button class="btn btn-red" style="width:100%" onclick="doOpenShort()" id="shortBtn">开空</button>`;
  }
}

function fillMaxBone(inputId){
  const el=$("#"+inputId);if(!el||userBoneBal<=0n)return;
  let val=userBoneBal;
  const reserve=pe("0.01");
  if(val>reserve)val=val-reserve;
  el.value=parseFloat(fe(val)).toFixed(6);
  el.dispatchEvent(new Event("input"));
}

function switchTab(t){currentTab=t;renderMain();refreshData();}

/* ---- chart ---- */
function initChart(){
  const ctx=document.getElementById("priceCanvas");
  if(!ctx)return;
  priceChart=new Chart(ctx,{
    type:"line",
    data:{labels:[],datasets:[{
      label:"标记价格",data:[],
      borderColor:"#6366f1",backgroundColor:"rgba(99,102,241,0.08)",
      fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:"#6366f1",borderWidth:2
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"#94a3b8",maxTicksLimit:10},grid:{color:"rgba(30,41,59,0.5)"}},
        y:{ticks:{color:"#94a3b8",callback:v=>v.toFixed(4)},grid:{color:"rgba(30,41,59,0.5)"}}
      }
    }
  });
  loadPriceHistory();
}

async function loadPriceHistory(){
  try{
    const filter=memeReadOnly.filters.PriceSnapshot();
    const logs=await memeReadOnly.queryFilter(filter,0,"latest");
    priceHistory=logs.map(l=>({
      block:Number(l.args[0]),
      price:parseFloat(fe(l.args[1]))
    }));
    const cur=await memeReadOnly.getMarkPrice();
    const bn=await readProvider.getBlockNumber();
    priceHistory.push({block:bn,price:parseFloat(fe(cur))});
    updateChart();
  }catch(e){
    console.warn("loadPriceHistory:",e);
    try{
      const cur=await memeReadOnly.getMarkPrice();
      priceHistory=[{block:0,price:parseFloat(fe(cur))}];
      updateChart();
    }catch(e2){}
  }
}

function updateChart(){
  if(!priceChart)return;
  priceChart.data.labels=priceHistory.map(p=>"#"+p.block);
  priceChart.data.datasets[0].data=priceHistory.map(p=>p.price);
  priceChart.update();
}

/* ---- wallet ---- */
async function connect(){
  if(!window.ethereum){showToast("请安装 MetaMask 钱包","error");return;}
  try{
    const accs=await window.ethereum.request({method:"eth_requestAccounts"});
    const cid=await window.ethereum.request({method:"eth_chainId"});
    if(parseInt(cid,16)!==CHAIN_ID){
      try{
        await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x"+CHAIN_ID.toString(16)}]});
      }catch(sw){
        if(sw.code===4902){
          await window.ethereum.request({method:"wallet_addEthereumChain",params:[{
            chainId:"0x"+CHAIN_ID.toString(16),chainName:"Puppynet Testnet",
            rpcUrls:[RPC],blockExplorerUrls:[EXPLORER],
            nativeCurrency:{name:"BONE",symbol:"BONE",decimals:18}
          }]});
        }else throw sw;
      }
    }
    provider=new ethers.BrowserProvider(window.ethereum);
    signer=await provider.getSigner();
    account=await signer.getAddress();
    meme=new ethers.Contract(MEME_ADDR,MEME_ABI,signer);
    token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    const [ib,ia]=await Promise.all([provider.getBalance(account),tokenRead2.balanceOf(account)]);
    userBoneBal=ib;userAmeBal=ia;
    renderHeader();
    renderTradePanel();
    showToast("钱包已连接","success");
    refreshData();
    window.ethereum.on("accountsChanged",()=>location.reload());
    window.ethereum.on("chainChanged",()=>location.reload());
  }catch(e){
    showToast("连接失败: "+e.message,"error");
  }
}

function disconnect(){account=null;signer=null;meme=null;token=null;userBoneBal=0n;userAmeBal=0n;renderHeader();renderTradePanel();$("#positions").innerHTML='<div class="empty">连接钱包查看持仓</div>';}

/* ---- data ---- */
async function refreshData(){
  const btn=$("#refreshBtn");
  if(btn){btn.classList.add("spinning");setTimeout(()=>btn.classList.remove("spinning"),1000);}
  try{
    const [price,twap,vault]=await Promise.all([
      memeReadOnly.getMarkPrice(),memeReadOnly.getTWAP(),memeReadOnly.vault()
    ]);
    const sp=$("#s-price"),st=$("#s-twap"),sv=$("#s-vault");
    if(sp)sp.textContent=fmt(price);
    if(st)st.textContent=fmt(twap);
    if(sv)sv.textContent=fmt(vault,2)+" BONE";
    const bn=await readProvider.getBlockNumber();
    const pv=parseFloat(fe(price));
    if(priceHistory.length===0||priceHistory[priceHistory.length-1].block!==bn){
      priceHistory.push({block:bn,price:pv});
      if(priceHistory.length>100)priceHistory.shift();
      updateChart();
    }
  }catch(e){console.warn("refreshData:",e);}
  if(account)loadPositions();
}

async function loadPositions(){
  const box=$("#positions");
  if(!box||!account)return;
  try{
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    const [ameBal,shortPos,shortPnl,boneBal]=await Promise.all([
      tokenRead2.balanceOf(account),
      memeReadOnly.getShortPosition(account),
      memeReadOnly.getShortPnL(account).catch(()=>0n),
      readProvider.getBalance(account)
    ]);
    userBoneBal=boneBal;
    userAmeBal=ameBal;
    const hb=$("#h-bone"),ha=$("#h-ame");
    if(hb)hb.textContent=fmt(userBoneBal,4);
    if(ha)ha.textContent=fmtShort(userAmeBal);
    renderTradePanel();

    let html="";
    let estLongVal=0n;
    if(ameBal>0n){try{estLongVal=await memeReadOnly.estimateLongPayout(ameBal);}catch(e){}}
    let estShortVal=0n;
    if(shortPos.points>0n){try{estShortVal=await memeReadOnly.estimateShortPayout(account,shortPos.points);}catch(e){}}
    const totalAsset=boneBal+estLongVal+estShortVal;
    html+=`
      <div class="account-overview">
        <div class="ao-title">账户资产</div>
        <div class="ao-grid">
          <div class="ao-item"><span class="ao-label">BONE 余额</span><span class="ao-val">${fmt(boneBal,4)}</span></div>
          <div class="ao-item"><span class="ao-label">AME 余额</span><span class="ao-val">${fmtShort(ameBal)}</span></div>
          <div class="ao-item"><span class="ao-label">多仓估值 (BONE)</span><span class="ao-val">${ameBal>0n?fmt(estLongVal,4):"0.0000"}</span></div>
          <div class="ao-item"><span class="ao-label">空仓估值 (BONE)</span><span class="ao-val">${shortPos.points>0n?fmt(estShortVal,4):"0.0000"}</span></div>
        </div>
      </div>`;

    const ameVal=ameBal;
    if(ameVal>0n){
      let estPayout="--";
      try{const ep=await memeReadOnly.estimateLongPayout(ameVal);estPayout=fmt(ep)+" BONE";}catch(e){}
      html+=`
        <div class="position-card">
          <div style="margin-bottom:8px"><span class="badge badge-long">LONG</span></div>
          <div class="row"><span class="k">持有 AME</span><span>${fmtShort(ameVal)}</span></div>
          <div class="row"><span class="k">预估平仓收益</span><span>${estPayout}</span></div>
          <div class="input-group" style="margin-top:10px">
            <label>平仓数量 (AME)</label>
            <input type="number" id="closeLongAmt" placeholder="全部平仓留空" step="0.01">
          </div>
          <button class="btn btn-outline" style="width:100%" onclick="doCloseLong()">平多</button>
        </div>`;
    }
    if(shortPos.margin>0n){
      const pnlVal=shortPnl;
      const pnlClass=pnlVal>=0n?"pnl-pos":"pnl-neg";
      const pnlSign=pnlVal>=0n?"+":"";
      let estShortPayout="--";
      try{const esp=await memeReadOnly.estimateShortPayout(account,shortPos.points);estShortPayout=fmt(esp)+" BONE";}catch(e){}
      html+=`
        <div class="position-card">
          <div style="margin-bottom:8px"><span class="badge badge-short">SHORT</span></div>
          <div class="row"><span class="k">保证金</span><span>${fmt(shortPos.margin)} BONE</span></div>
          <div class="row"><span class="k">仓位大小</span><span>${fmtShort(shortPos.baseSize)}</span></div>
          <div class="row"><span class="k">开仓价值</span><span>${fmt(shortPos.openNotional)} BONE</span></div>
          <div class="row"><span class="k">Points</span><span>${fmtShort(shortPos.points)}</span></div>
          <div class="row"><span class="k">盈亏</span><span class="${pnlClass}">${pnlSign}${fmt(pnlVal)} BONE</span></div>
          <div class="row"><span class="k">预估平仓收益</span><span>${estShortPayout}</span></div>
          <div class="input-group" style="margin-top:10px">
            <label>平仓 Points 数量</label>
            <input type="number" id="closeShortAmt" placeholder="全部平仓留空" step="0.01">
          </div>
          <button class="btn btn-outline" style="width:100%" onclick="doCloseShort()">平空</button>
        </div>`;
    }
    if(!html)html='<div class="empty">暂无持仓</div>';
    box.innerHTML=html;
  }catch(e){
    console.warn("loadPositions:",e);
    box.innerHTML='<div class="empty">加载失败，请重试</div>';
  }
}

/* ---- estimate ---- */
async function estimateLong(){
  const el=$("#longEst");if(!el)return;
  const v=$("#longAmount")?.value;
  if(!v||parseFloat(v)<=0){el.textContent="";return;}
  try{
    const amt=pe(v);
    const [vX,vY,K_val,fee]=await Promise.all([memeReadOnly.virtualX(),memeReadOnly.virtualY(),memeReadOnly.K(),memeReadOnly.openFeeRate()]);
    const feeAmt=amt*fee/10000n;
    const net=amt-feeAmt;
    const newY=vY+net;
    // virtualX = ceilDiv(K, virtualY) => K / newY (approximate)
    const newX=K_val/newY;
    const baseSize=vX-newX;
    const ameAmount=baseSize*100000n;
    el.textContent=`预计获得 ~${fmtShort(ameAmount)} AME（手续费 ${fmt(feeAmt,6)} BONE）`;
  }catch(e){el.textContent="";}
}

/* ---- balance helper ---- */
async function updateBalances(){
  if(!account)return;
  try{
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    const [b,a]=await Promise.all([readProvider.getBalance(account),tokenRead2.balanceOf(account)]);
    userBoneBal=b;userAmeBal=a;
    const hb=$("#h-bone"),ha=$("#h-ame");
    if(hb)hb.textContent=fmt(userBoneBal,4);
    if(ha)ha.textContent=fmtShort(userAmeBal);
  }catch(e){}
}

/* ---- trade actions ---- */
async function doOpenLong(){
  if(!signer){showToast("请先连接钱包","error");return;}
  const v=$("#longAmount")?.value;
  if(!v||parseFloat(v)<=0){showToast("请输入金额","error");return;}
  const btn=$("#longBtn");btn.disabled=true;btn.textContent="处理中...";
  try{
    // minAmeOut = 0 (no slippage protection for simplicity)
    const tx=await meme.openLong(0,{value:pe(v)});
    showToast("交易已提交，等待确认...","info");
    await tx.wait();
    showToast("开多成功！","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("交易失败: "+(e.reason||e.message),"error");
  }
  btn.disabled=false;btn.textContent="开多";
}

async function doOpenShort(){
  if(!signer){showToast("请先连接钱包","error");return;}
  const v=$("#shortAmount")?.value;
  if(!v||parseFloat(v)<=0){showToast("请输入金额","error");return;}
  const btn=$("#shortBtn");btn.disabled=true;btn.textContent="处理中...";
  try{
    // minPoints = 0 (no slippage protection for simplicity)
    const tx=await meme.openShort(0,{value:pe(v)});
    showToast("交易已提交，等待确认...","info");
    await tx.wait();
    showToast("开空成功！","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("交易失败: "+(e.reason||e.message),"error");
  }
  btn.disabled=false;btn.textContent="开空";
}

async function doCloseLong(){
  if(!signer){showToast("请先连接钱包","error");return;}
  try{
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    let amt=$("#closeLongAmt")?.value;
    if(!amt||parseFloat(amt)<=0){
      amt=await tokenRead2.balanceOf(account);
    }else{
      amt=pe(amt);
    }
    if(amt<=0n){showToast("无可平仓位","error");return;}
    // 检查 approve
    const allowance=await tokenRead2.allowance(account,MEME_ADDR);
    if(allowance<amt){
      showToast("需要授权 AME 代币...","info");
      const appTx=await token.approve(MEME_ADDR,ethers.MaxUint256);
      await appTx.wait();
      showToast("授权成功，正在平仓...","info");
    }
    // minPayout = 0
    const tx=await meme.closeLong(amt,0);
    showToast("交易已提交...","info");
    await tx.wait();
    showToast("平多成功！","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("平仓失败: "+(e.reason||e.message),"error");
  }
}

async function doCloseShort(){
  if(!signer){showToast("请先连接钱包","error");return;}
  try{
    let amt=$("#closeShortAmt")?.value;
    if(!amt||parseFloat(amt)<=0){
      const pos=await memeReadOnly.getShortPosition(account);
      amt=pos.points;
    }else{
      amt=pe(amt);
    }
    if(amt<=0n){showToast("无可平仓位","error");return;}
    // minPayout = 0
    const tx=await meme.closeShort(amt,0);
    showToast("交易已提交...","info");
    await tx.wait();
    showToast("平空成功！","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("平仓失败: "+(e.reason||e.message),"error");
  }
}

renderHeader();
renderMain();
refreshData();
refreshTimer=setInterval(refreshData,15000);
