<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AME - A Meme Coin</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--card:#111827;--card2:#0d1320;--border:#1e293b;
  --accent:#6366f1;--accent2:#818cf8;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
  --hover:#1e1b4b;--glow:rgba(99,102,241,.15);
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
header .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
header .logo span{font-size:11px;font-weight:500;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-left:8px;letter-spacing:0}
.header-right{display:flex;align-items:center;gap:10px}
.bal-group{display:flex;gap:8px;align-items:center}
.bal-chip{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:5px}
.bal-chip .bl{color:var(--dim);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bal-chip .bv{font-weight:700;color:var(--text);font-size:13px}
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s;letter-spacing:-.2px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5;box-shadow:0 0 20px rgba(99,102,241,.3)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a;box-shadow:0 0 20px rgba(34,197,94,.3)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#dc2626;box-shadow:0 0 20px rgba(239,68,68,.3)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);background:var(--glow)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.wallet-btn{display:flex;align-items:center;gap:8px;font-size:13px}
.wallet-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
main{max-width:960px;margin:0 auto;padding:20px 16px 60px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat-item{text-align:center;padding:18px 12px;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(99,102,241,.02));border-radius:14px;border:1px solid rgba(99,102,241,.1)}
.stat-item .label{font-size:11px;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.stat-item .value{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:border-color .2s}
.card h3{font-size:15px;margin-bottom:16px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg);padding:4px;border-radius:10px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s;border:none;color:var(--muted);background:transparent}
.tab.active-long{background:var(--green-bg);color:var(--green)}
.tab.active-short{background:var(--red-bg);color:var(--red)}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.input-group input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:border .2s;font-family:inherit;font-variant-numeric:tabular-nums}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.input-group input::placeholder{color:var(--dim)}
.pct-row{display:flex;gap:6px;margin-top:8px}
.pct-btn{flex:1;padding:6px 0;text-align:center;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.pct-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow)}
.pct-btn:active{transform:scale(.95)}
.pct-btn.max-style{background:rgba(99,102,241,.12);color:var(--accent);border-color:rgba(99,102,241,.3)}
.pct-btn.max-style:hover{background:rgba(99,102,241,.2);border-color:var(--accent)}
.balance-hint{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:6px}
.balance-hint .avail{font-weight:500}
.est{font-size:13px;color:var(--muted);margin-bottom:12px;min-height:20px;padding:8px 12px;background:rgba(99,102,241,.04);border-radius:8px;border:1px solid rgba(99,102,241,.06);display:none}
.est.show{display:block}
.account-overview{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(167,139,250,.04));border:1px solid rgba(99,102,241,.15);border-radius:12px;padding:16px;margin-bottom:14px}
.account-overview .ao-title{font-size:12px;color:var(--dim);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.ao-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ao-item{display:flex;flex-direction:column;gap:2px}
.ao-item .ao-label{font-size:11px;color:var(--dim)}
.ao-item .ao-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.position-card{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border);transition:border-color .2s}
.position-card:hover{border-color:rgba(99,102,241,.3)}
.position-card .row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.position-card .row .k{color:var(--dim)}
.position-card .row span:last-child{font-weight:500;font-variant-numeric:tabular-nums}
.pnl-pos{color:var(--green)!important}.pnl-neg{color:var(--red)!important}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-long{background:var(--green-bg);color:var(--green)}
.badge-short{background:var(--red-bg);color:var(--red)}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;font-size:13px;z-index:999;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:all .3s;font-weight:500;backdrop-filter:blur(12px)}
.toast.hidden{opacity:0;transform:translateY(20px);pointer-events:none}
.toast.success{background:rgba(6,95,70,.9);border:1px solid var(--green);color:#bbf7d0}
.toast.error{background:rgba(127,29,29,.9);border:1px solid var(--red);color:#fca5a5}
.toast.info{background:rgba(30,27,75,.9);border:1px solid var(--accent);color:#c7d2fe}
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}
.full-width{grid-column:1/-1}
.refresh-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;transition:all .3s;padding:4px;border-radius:6px}
.refresh-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.refresh-btn.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--dim);border-top:1px solid var(--border);margin-top:40px}
@media(max-width:768px){
  header{padding:12px 16px;flex-wrap:wrap;gap:10px}
  header .logo{font-size:20px}
  .header-right{width:100%;justify-content:space-between}
  .bal-group{gap:6px}
  .bal-chip{padding:4px 8px;font-size:11px}
  .bal-chip .bv{font-size:12px}
  main{padding:16px 12px 40px}
  .stats{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .stat-item{padding:12px 8px}
  .stat-item .label{font-size:10px}
  .stat-item .value{font-size:16px}
  .grid{grid-template-columns:1fr;gap:12px}
  .card{padding:16px;border-radius:14px}
  .toast{left:16px;right:16px;bottom:16px;max-width:none}
  .pct-row{gap:4px}
  .pct-btn{padding:8px 0;font-size:11px}
  .ao-grid{grid-template-columns:1fr 1fr;gap:8px}
  .ao-item .ao-val{font-size:13px}
}
@media(max-width:360px){
  .stats{grid-template-columns:1fr}
  .ao-grid{grid-template-columns:1fr}
  .bal-group{flex-wrap:wrap}
}
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
  <div id="toast" class="toast hidden"></div>
</div>
<script>
const MEME_ADDR="0xBaCbdb98561A6986d52222b813648f5Dd74c6135";
const TOKEN_ADDR="0x5e61FebB0531e11a1081ED7bb2C390f37600274f";
const CHAIN_ID=157;
const RPC="https://puppynet.shibrpc.com";
const EXPLORER="https://puppyscan.shib.io";

const MEME_ABI=[{"inputs":[],"name":"BPS","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"K","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"virtualX","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"virtualY","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"ameToken","outputs":[{"type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"closeFeeRate","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"ameAmount","type":"uint256"},{"name":"minPayout","type":"uint256"}],"name":"closeLong","outputs":[{"type":"uint256"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"pointsAmount","type":"uint256"},{"name":"minPayout","type":"uint256"}],"name":"closeShort","outputs":[{"type":"uint256"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"ameAmount","type":"uint256"}],"name":"estimateLongPayout","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"addr","type":"address"},{"name":"pointsAmount","type":"uint256"}],"name":"estimateShortPayout","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"feeCollected","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getAmePrice","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"addr","type":"address"}],"name":"getShortPnL","outputs":[{"type":"int256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"addr","type":"address"}],"name":"getShortPosition","outputs":[{"components":[{"name":"margin","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"openNotional","type":"uint256"},{"name":"openBlock","type":"uint256"},{"name":"points","type":"uint256"}],"type":"tuple"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"maxShortAmount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"minTradeAmount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"openFeeRate","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"minAmeOut","type":"uint256"}],"name":"openLong","outputs":[{"type":"uint256"}],"stateMutability":"payable","type":"function"},{"inputs":[{"name":"minPoints","type":"uint256"}],"name":"openShort","outputs":[{"type":"uint256"}],"stateMutability":"payable","type":"function"},{"inputs":[],"name":"totalShortBase","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"vault","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tokenMultiplier","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"anonymous":false,"inputs":[{"indexed":true,"name":"user","type":"address"},{"name":"ethAmount","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"ameAmount","type":"uint256"},{"name":"fee","type":"uint256"},{"name":"price","type":"uint256"}],"name":"LongOpened","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"user","type":"address"},{"name":"ameBurned","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"payout","type":"uint256"},{"name":"fee","type":"uint256"},{"name":"price","type":"uint256"}],"name":"LongClosed","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"owner","type":"address"},{"name":"margin","type":"uint256"},{"name":"baseSize","type":"uint256"},{"name":"openNotional","type":"uint256"},{"name":"points","type":"uint256"},{"name":"price","type":"uint256"}],"name":"ShortOpened","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"owner","type":"address"},{"name":"pointsClosed","type":"uint256"},{"name":"pnl","type":"int256"},{"name":"payout","type":"uint256"},{"name":"fee","type":"uint256"},{"name":"price","type":"uint256"}],"name":"ShortClosed","type":"event"}];

const TOKEN_ABI=[{"inputs":[{"name":"","type":"address"}],"name":"balanceOf","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","outputs":[{"type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"","type":"address"},{"name":"","type":"address"}],"name":"allowance","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"type":"uint8"}],"stateMutability":"view","type":"function"}];

let provider,signer,meme,memeRead,token,tokenRead,account=null;
let currentTab="long";
let userBoneBal=0n,userAmeBal=0n;

const readProvider=new ethers.JsonRpcProvider(RPC);
const memeReadOnly=new ethers.Contract(MEME_ADDR,MEME_ABI,readProvider);

const pe=ethers.parseEther;
const fe=ethers.formatEther;
const $=s=>document.querySelector(s);
const shortAddr=a=>a.slice(0,6)+"..."+a.slice(-4);

const fmt=(v,d=4)=>parseFloat(fe(v)).toFixed(d);
const fmtFull18=(v)=>fe(v);
const fmtShort=(v)=>parseFloat(fe(v)).toFixed(6);

function showToast(msg,type="info",ms=4000){
  const t=$("#toast");t.textContent=msg;t.className=`toast ${type}`;
  setTimeout(()=>t.classList.add("hidden"),ms);
}

function renderHeader(){
  let balHtml="";
  if(account){
    balHtml=`<div class="bal-group">
      <div class="bal-chip"><span class="bl">BONE</span><span class="bv" id="h-bone">${fmt(userBoneBal,4)}</span></div>
      <div class="bal-chip"><span class="bl">AME</span><span class="bv" id="h-ame">${fmtShort(userAmeBal)}</span></div>
    </div>`;
  }
  $("#header").innerHTML=`
    <div class="logo">AME<span>Puppynet</span></div>
    <div class="header-right">
      ${balHtml}
      ${account
        ?`<button class="btn btn-outline wallet-btn" onclick="disconnect()"><span class="dot"></span>${shortAddr(account)}</button>`
        :`<button class="btn btn-primary" onclick="connect()">连接钱包</button>`}
    </div>`;
}

function fillPct(inputId,pct,rawBalance){
  const el=$("#"+inputId);if(!el||rawBalance<=0n)return;
  let val;
  if(pct>=100){
    val=fmtFull18(rawBalance);
  }else{
    val=fmtFull18(rawBalance*BigInt(pct)/100n);
  }
  el.value=val;
  el.dispatchEvent(new Event("input"));
}

function makePctButtons(inputId,balanceGetter){
  return `<div class="pct-row">
    <button class="pct-btn" onclick="${balanceGetter};fillPct('${inputId}',25,_bal)">25%</button>
    <button class="pct-btn" onclick="${balanceGetter};fillPct('${inputId}',50,_bal)">50%</button>
    <button class="pct-btn" onclick="${balanceGetter};fillPct('${inputId}',75,_bal)">75%</button>
    <button class="pct-btn max-style" onclick="${balanceGetter};fillPct('${inputId}',100,_bal)">MAX</button>
  </div>`;
}

function renderMain(){
  $("#main").innerHTML=`
    <div class="stats" id="stats">
      <div class="stat-item"><div class="label">AME 价格</div><div class="value" id="s-price">--</div></div>
      <div class="stat-item"><div class="label">最大可开空</div><div class="value" id="s-maxshort">--</div></div>
      <div class="stat-item"><div class="label">资金池</div><div class="value" id="s-vault">--</div></div>
    </div>
    <div class="grid">
      <div class="card">
        <h3>交易 <button class="refresh-btn" id="refreshBtn" onclick="refreshData()" title="刷新数据">&#x21bb;</button></h3>
        <div class="tabs">
          <button class="tab ${currentTab==='long'?'active-long':''}" onclick="switchTab('long')">做多 Long</button>
          <button class="tab ${currentTab==='short'?'active-short':''}" onclick="switchTab('short')">做空 Short</button>
        </div>
        <div id="trade-panel"></div>
      </div>
      <div class="card">
        <h3>我的持仓</h3>
        <div id="positions"><div class="empty">连接钱包查看持仓</div></div>
      </div>
    </div>
    <div class="footer">AME V6 &middot; A Meme Coin on Puppynet &middot; DYOR</div>`;
  renderTradePanel();
}

function renderTradePanel(){
  const panel=$("#trade-panel");
  if(!panel)return;
  const boneStr=account?fmt(userBoneBal,4):"--";
  const bonePctGetter="var _bal=userBoneBal>10000000000000000n?userBoneBal-10000000000000000n:userBoneBal";

  if(currentTab==="long"){
    panel.innerHTML=`
      <div class="input-group">
        <label>投入金额 (BONE)</label>
        <input type="text" inputmode="decimal" id="longAmount" placeholder="0.0" oninput="estimateLong()">
        <div class="balance-hint">
          <span>最小: 0.0001 BONE &middot; 手续费 0.5%</span>
          <span class="avail">可用: ${boneStr}</span>
        </div>
        ${makePctButtons("longAmount",bonePctGetter)}
      </div>
      <div class="est" id="longEst"></div>
      <button class="btn btn-green" style="width:100%;padding:14px" onclick="doOpenLong()" id="longBtn">开多</button>`;
  }else{
    panel.innerHTML=`
      <div class="input-group">
        <label>保证金 (BONE)</label>
        <input type="text" inputmode="decimal" id="shortAmount" placeholder="0.0">
        <div class="balance-hint">
          <span>最小: 0.0001 BONE &middot; 手续费 0.5%</span>
          <span class="avail">可用: ${boneStr}</span>
        </div>
        ${makePctButtons("shortAmount",bonePctGetter)}
      </div>
      <div class="est" id="shortEst"></div>
      <button class="btn btn-red" style="width:100%;padding:14px" onclick="doOpenShort()" id="shortBtn">开空</button>`;
  }
}

function switchTab(t){currentTab=t;renderMain();refreshData();}

async function connect(){
  if(!window.ethereum){showToast("请安装 MetaMask 钱包","error");return;}
  try{
    const accs=await window.ethereum.request({method:"eth_requestAccounts"});
    const cid=await window.ethereum.request({method:"eth_chainId"});
    if(parseInt(cid,16)!==CHAIN_ID){
      try{
        await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x"+CHAIN_ID.toString(16)}]});
      }catch(sw){
        if(sw.code===4902){
          await window.ethereum.request({method:"wallet_addEthereumChain",params:[{
            chainId:"0x"+CHAIN_ID.toString(16),chainName:"Puppynet Testnet",
            rpcUrls:[RPC],blockExplorerUrls:[EXPLORER],
            nativeCurrency:{name:"BONE",symbol:"BONE",decimals:18}
          }]});
        }else throw sw;
      }
    }
    provider=new ethers.BrowserProvider(window.ethereum);
    signer=await provider.getSigner();
    account=await signer.getAddress();
    meme=new ethers.Contract(MEME_ADDR,MEME_ABI,signer);
    token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    const [ib,ia]=await Promise.all([provider.getBalance(account),tokenRead2.balanceOf(account)]);
    userBoneBal=ib;userAmeBal=ia;
    renderHeader();
    renderTradePanel();
    showToast("钱包已连接","success");
    refreshData();
    window.ethereum.on("accountsChanged",()=>location.reload());
    window.ethereum.on("chainChanged",()=>location.reload());
  }catch(e){
    showToast("连接失败: "+e.message,"error");
  }
}

function disconnect(){account=null;signer=null;meme=null;token=null;userBoneBal=0n;userAmeBal=0n;renderHeader();renderTradePanel();$("#positions").innerHTML='<div class="empty">连接钱包查看持仓</div>';}

async function refreshData(){
  const btn=$("#refreshBtn");
  if(btn){btn.classList.add("spinning");setTimeout(()=>btn.classList.remove("spinning"),800);}
  try{
    const [price,maxShort,vault]=await Promise.all([
      memeReadOnly.getAmePrice(),memeReadOnly.maxShortAmount(),memeReadOnly.vault()
    ]);
    const sp=$("#s-price"),sm=$("#s-maxshort"),sv=$("#s-vault");
    if(sp)sp.textContent=fmt(price,10);
    if(sm)sm.textContent=fmt(maxShort,2)+" BONE";
    if(sv)sv.textContent=fmt(vault,2)+" BONE";
  }catch(e){console.warn("refreshData:",e);}
  if(account)loadPositions();
}

async function loadPositions(){
  const box=$("#positions");
  if(!box||!account)return;
  try{
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    const [ameBal,shortPos,shortPnl,boneBal]=await Promise.all([
      tokenRead2.balanceOf(account),
      memeReadOnly.getShortPosition(account),
      memeReadOnly.getShortPnL(account).catch(()=>0n),
      readProvider.getBalance(account)
    ]);
    userBoneBal=boneBal;
    userAmeBal=ameBal;
    const hb=$("#h-bone"),ha=$("#h-ame");
    if(hb)hb.textContent=fmt(userBoneBal,4);
    if(ha)ha.textContent=fmtShort(userAmeBal);
    renderTradePanel();

    let html="";
    let estLongVal=0n;
    if(ameBal>0n){try{estLongVal=await memeReadOnly.estimateLongPayout(ameBal);}catch(e){}}
    let estShortVal=0n;
    if(shortPos.points>0n){try{estShortVal=await memeReadOnly.estimateShortPayout(account,shortPos.points);}catch(e){}}

    html+=`
      <div class="account-overview">
        <div class="ao-title">账户总览</div>
        <div class="ao-grid">
          <div class="ao-item"><span class="ao-label">BONE 余额</span><span class="ao-val">${fmt(boneBal,4)}</span></div>
          <div class="ao-item"><span class="ao-label">AME 余额</span><span class="ao-val">${fmtShort(ameBal)}</span></div>
          <div class="ao-item"><span class="ao-label">多仓估值</span><span class="ao-val">${ameBal>0n?fmt(estLongVal,4):"0.0000"} BONE</span></div>
          <div class="ao-item"><span class="ao-label">空仓估值</span><span class="ao-val">${shortPos.points>0n?fmt(estShortVal,4):"0.0000"} BONE</span></div>
        </div>
      </div>`;

    const ameVal=ameBal;
    if(ameVal>0n){
      let estPayout="--";
      try{const ep=await memeReadOnly.estimateLongPayout(ameVal);estPayout=fmt(ep)+" BONE";}catch(e){}
      html+=`
        <div class="position-card">
          <div style="margin-bottom:10px"><span class="badge badge-long">LONG</span></div>
          <div class="row"><span class="k">持有 AME</span><span>${fmtShort(ameVal)}</span></div>
          <div class="row"><span class="k">预估平仓收益</span><span>${estPayout}</span></div>
          <div class="input-group" style="margin-top:12px">
            <label>平仓数量 (AME)</label>
            <input type="text" inputmode="decimal" id="closeLongAmt" placeholder="留空则全部平仓">
            <div class="pct-row">
              <button class="pct-btn" onclick="var _bal=userAmeBal;fillPct('closeLongAmt',25,_bal)">25%</button>
              <button class="pct-btn" onclick="var _bal=userAmeBal;fillPct('closeLongAmt',50,_bal)">50%</button>
              <button class="pct-btn" onclick="var _bal=userAmeBal;fillPct('closeLongAmt',75,_bal)">75%</button>
              <button class="pct-btn max-style" onclick="var _bal=userAmeBal;fillPct('closeLongAmt',100,_bal)">MAX</button>
            </div>
          </div>
          <button class="btn btn-outline" style="width:100%;padding:12px" onclick="doCloseLong()">平多</button>
        </div>`;
    }
    if(shortPos.margin>0n){
      const pnlVal=shortPnl;
      const pnlClass=pnlVal>=0n?"pnl-pos":"pnl-neg";
      const pnlSign=pnlVal>=0n?"+":"";
      let estShortPayout="--";
      const shortPoints=shortPos.points;
      try{const esp=await memeReadOnly.estimateShortPayout(account,shortPoints);estShortPayout=fmt(esp)+" BONE";}catch(e){}
      html+=`
        <div class="position-card">
          <div style="margin-bottom:10px"><span class="badge badge-short">SHORT</span></div>
          <div class="row"><span class="k">保证金</span><span>${fmt(shortPos.margin)} BONE</span></div>
          <div class="row"><span class="k">仓位大小</span><span>${fmtShort(shortPos.baseSize)}</span></div>
          <div class="row"><span class="k">开仓价值</span><span>${fmt(shortPos.openNotional)} BONE</span></div>
          <div class="row"><span class="k">Points</span><span>${fmtShort(shortPoints)}</span></div>
          <div class="row"><span class="k">盈亏</span><span class="${pnlClass}">${pnlSign}${fmt(pnlVal)} BONE</span></div>
          <div class="row"><span class="k">预估平仓收益</span><span>${estShortPayout}</span></div>
          <div class="input-group" style="margin-top:12px">
            <label>平仓 Points 数量</label>
            <input type="text" inputmode="decimal" id="closeShortAmt" placeholder="留空则全部平仓">
            <div class="pct-row">
              <button class="pct-btn" onclick="var _bal=${shortPoints.toString()}n;fillPct('closeShortAmt',25,_bal)">25%</button>
              <button class="pct-btn" onclick="var _bal=${shortPoints.toString()}n;fillPct('closeShortAmt',50,_bal)">50%</button>
              <button class="pct-btn" onclick="var _bal=${shortPoints.toString()}n;fillPct('closeShortAmt',75,_bal)">75%</button>
              <button class="pct-btn max-style" onclick="var _bal=${shortPoints.toString()}n;fillPct('closeShortAmt',100,_bal)">MAX</button>
            </div>
          </div>
          <button class="btn btn-outline" style="width:100%;padding:12px" onclick="doCloseShort()">平空</button>
        </div>`;
    }
    if(ameVal<=0n && shortPos.margin<=0n){
      html+='<div class="empty">暂无持仓</div>';
    }
    box.innerHTML=html;
  }catch(e){
    console.warn("loadPositions:",e);
    box.innerHTML='<div class="empty">加载失败，请重试</div>';
  }
}

async function estimateLong(){
  const el=$("#longEst");if(!el)return;
  const v=$("#longAmount")?.value;
  if(!v||parseFloat(v)<=0){el.classList.remove("show");el.textContent="";return;}
  try{
    const amt=pe(v);
    const [vX,vY,K_val,fee]=await Promise.all([memeReadOnly.virtualX(),memeReadOnly.virtualY(),memeReadOnly.K(),memeReadOnly.openFeeRate()]);
    const feeAmt=amt*fee/10000n;
    const net=amt-feeAmt;
    const newY=vY+net;
    const newX=K_val/newY;
    const baseSize=vX-newX;
    const ameAmount=baseSize*100000n;
    el.textContent=`预计获得 ~${fmtShort(ameAmount)} AME (手续费 ${fmt(feeAmt,6)} BONE)`;
    el.classList.add("show");
  }catch(e){el.classList.remove("show");el.textContent="";}
}

async function updateBalances(){
  if(!account)return;
  try{
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    const [b,a]=await Promise.all([readProvider.getBalance(account),tokenRead2.balanceOf(account)]);
    userBoneBal=b;userAmeBal=a;
    const hb=$("#h-bone"),ha=$("#h-ame");
    if(hb)hb.textContent=fmt(userBoneBal,4);
    if(ha)ha.textContent=fmtShort(userAmeBal);
  }catch(e){}
}

async function doOpenLong(){
  if(!signer){showToast("请先连接钱包","error");return;}
  const v=$("#longAmount")?.value;
  if(!v||parseFloat(v)<=0){showToast("请输入金额","error");return;}
  const btn=$("#longBtn");btn.disabled=true;btn.textContent="处理中...";
  try{
    const tx=await meme.openLong(0,{value:pe(v)});
    showToast("交易已提交，等待确认...","info");
    await tx.wait();
    showToast("开多成功!","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("交易失败: "+(e.reason||e.message),"error");
  }
  btn.disabled=false;btn.textContent="开多";
}

async function doOpenShort(){
  if(!signer){showToast("请先连接钱包","error");return;}
  const v=$("#shortAmount")?.value;
  if(!v||parseFloat(v)<=0){showToast("请输入金额","error");return;}
  const btn=$("#shortBtn");btn.disabled=true;btn.textContent="处理中...";
  try{
    const tx=await meme.openShort(0,{value:pe(v)});
    showToast("交易已提交，等待确认...","info");
    await tx.wait();
    showToast("开空成功!","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("交易失败: "+(e.reason||e.message),"error");
  }
  btn.disabled=false;btn.textContent="开空";
}

async function doCloseLong(){
  if(!signer){showToast("请先连接钱包","error");return;}
  try{
    const tokenRead2=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,readProvider);
    let amt=$("#closeLongAmt")?.value;
    if(!amt||parseFloat(amt)<=0){
      amt=await tokenRead2.balanceOf(account);
    }else{
      amt=pe(amt);
    }
    if(amt<=0n){showToast("无可平仓位","error");return;}
    const allowance=await tokenRead2.allowance(account,MEME_ADDR);
    if(allowance<amt){
      showToast("需要授权 AME 代币...","info");
      const appTx=await token.approve(MEME_ADDR,ethers.MaxUint256);
      await appTx.wait();
      showToast("授权成功，正在平仓...","info");
    }
    const tx=await meme.closeLong(amt,0);
    showToast("交易已提交...","info");
    await tx.wait();
    showToast("平多成功!","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("平仓失败: "+(e.reason||e.message),"error");
  }
}

async function doCloseShort(){
  if(!signer){showToast("请先连接钱包","error");return;}
  try{
    let amt=$("#closeShortAmt")?.value;
    if(!amt||parseFloat(amt)<=0){
      const pos=await memeReadOnly.getShortPosition(account);
      amt=pos.points;
    }else{
      amt=pe(amt);
    }
    if(amt<=0n){showToast("无可平仓位","error");return;}
    const tx=await meme.closeShort(amt,0);
    showToast("交易已提交...","info");
    await tx.wait();
    showToast("平空成功!","success");
    await updateBalances();
    refreshData();
  }catch(e){
    showToast("平仓失败: "+(e.reason||e.message),"error");
  }
}

renderHeader();
renderMain();
refreshData();
</script>
